services:
  watch-together-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: watch-together-server:latest
    container_name: watch-together-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      CF_API_TOKEN: "${CF_API_TOKEN:?set CF_API_TOKEN in .env}"
      CF_TURN_KEY_ID: "${CF_TURN_KEY_ID:?set CF_TURN_KEY_ID in .env}"
      TURN_TRANSPORT: "${TURN_TRANSPORT:-tcp}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
